name: '🔍 PR Validation'

on:
  pull_request_target:
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: read

jobs:
  validate:
    uses: cd-ai-pm/github-shared-workflows/.github/workflows/pr-checks.yml@master
    with:
      types: fix
      requireScope: true
      checkLabels: true
