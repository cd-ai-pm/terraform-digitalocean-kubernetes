name: 'Auto-assign PR'

on:
  pull_request_target:
    types: [opened, reopened, ready_for_review]

permissions:
  pull-requests: write

jobs:
  assign:
    uses: cd-ai-pm/github-shared-workflows/.github/workflows/pr-auto-assignee.yml@master
    with:
      assignees: clouddrove-ci
      reviewers: clouddrove-ci
    secrets:
      GITHUB: ${{ secrets.GITHUB_TOKEN }}
